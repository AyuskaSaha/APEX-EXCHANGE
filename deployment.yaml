---
# ═══════════════════════════════════════════════════════════════════════════════
#  Kubernetes Deployment — Apex Exchange
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: exchange
  labels:
    app: apex-exchange

---
# ─── Order Service ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: exchange
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ghcr.io/your-org/apex-exchange/order-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka-headless:9092
        - name: REDIS_URL
          value: redis://redis:6379
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: exchange
spec:
  selector:
    app: order-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP

---
# ─── Matching Engine ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: exchange
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      # Schedule on high-performance nodes
      nodeSelector:
        node-type: compute-optimized
      containers:
      - name: matching-engine
        image: ghcr.io/your-org/apex-exchange/matching-engine:latest
        ports:
        - containerPort: 8010
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka-headless:9092
        - name: THREADS
          value: "16"
        resources:
          requests:
            cpu: "4"
            memory: "4Gi"
          limits:
            cpu: "8"
            memory: "8Gi"

---
# ─── HPA — Order Service ──────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: exchange
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70

---
# ─── Risk Engine ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: exchange
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
      - name: risk-engine
        image: ghcr.io/your-org/apex-exchange/risk-engine:latest
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka-headless:9092
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

---
# ─── Market Simulator ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-simulator
  namespace: exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-simulator
  template:
    metadata:
      labels:
        app: market-simulator
    spec:
      containers:
      - name: market-simulator
        image: ghcr.io/your-org/apex-exchange/market-simulator:latest
        command: ["python", "market_simulator.py"]
        args: ["--traders", "10000", "--target-ops", "50000"]
        env:
        - name: KAFKA_BOOTSTRAP
          value: kafka-headless:9092
        resources:
          requests:
            cpu: "1"
            memory: "512Mi"
          limits:
            cpu: "4"
            memory: "2Gi"

---
# ─── Dashboard ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: exchange
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/your-org/apex-exchange/dashboard:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: exchange
spec:
  selector:
    app: dashboard
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer

---
# ─── Ingress ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exchange-ingress
  namespace: exchange
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
  - host: exchange.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dashboard
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 8001
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 8001
