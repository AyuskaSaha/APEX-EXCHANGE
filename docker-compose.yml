version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════════
#  AI-Powered Low-Latency Stock Exchange Matching Engine
#  Full Docker Compose Stack
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  exchange-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  kafka-data:
  zk-data:
  redis-data:
  prometheus-data:
  grafana-data:
  postgres-data:

services:

  # ────────────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    hostname: zookeeper
    networks: [exchange-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    networks: [exchange-net]
    ports:
      - "9092:9092"
      - "9094:9094"  # external
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      # Performance tuning
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      kafka:
        condition: service_healthy
    networks: [exchange-net]
    command: |
      bash -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders       --partitions 8 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trades       --partitions 8 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic market-data  --partitions 4 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic risk-alerts  --partitions 2 --replication-factor 1 &&
        echo 'Topics created successfully'
      "
    restart: on-failure

  redis:
    image: redis:7.2-alpine
    hostname: redis
    networks: [exchange-net]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: [exchange-net]
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: exchange_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange"]
      interval: 10s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Matching Engine (C++ binary served via REST/WS bridge)
  # ────────────────────────────────────────────────────────

  matching-engine:
    build:
      context: ./engine
      dockerfile: ../deployment/docker/Dockerfile.engine
    hostname: matching-engine
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    ports:
      - "8010:8010"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SYMBOLS: "AAPL,MSFT,TSLA,NVDA,AMZN,GOOGL,META,SPY,QQQ,BRK"
      THREADS: "8"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────
  # Python Services
  # ────────────────────────────────────────────────────────

  order-service:
    build:
      context: ./services/order_service
      dockerfile: ../../deployment/docker/Dockerfile.python
    hostname: order-service
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks: [exchange-net]
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_URL: redis://redis:6379
    command: python order_service.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      retries: 5

  risk-engine:
    build:
      context: ./services/risk_service
      dockerfile: ../../deployment/docker/Dockerfile.python
    hostname: risk-engine
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python risk_engine.py
    restart: unless-stopped

  analytics-engine:
    build:
      context: ./analytics
      dockerfile: ../deployment/docker/Dockerfile.python
    hostname: analytics-engine
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python analytics_engine.py
    restart: unless-stopped

  # ────────────────────────────────────────────────────────
  # AI Agents
  # ────────────────────────────────────────────────────────

  rl-trader-aapl:
    build:
      context: ./ai_agents
      dockerfile: ../deployment/docker/Dockerfile.python
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python rl_trader.py AAPL
    restart: unless-stopped

  rl-trader-tsla:
    build:
      context: ./ai_agents
      dockerfile: ../deployment/docker/Dockerfile.python
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python rl_trader.py TSLA
    restart: unless-stopped

  surveillance:
    build:
      context: ./ai_agents
      dockerfile: ../deployment/docker/Dockerfile.python
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python manipulation_detector.py
    restart: unless-stopped

  # ────────────────────────────────────────────────────────
  # Market Simulator
  # ────────────────────────────────────────────────────────

  market-simulator:
    build:
      context: ./simulator
      dockerfile: ../deployment/docker/Dockerfile.python
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [exchange-net]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    command: python market_simulator.py --traders 10000 --target-ops 50000
    restart: unless-stopped

  # ────────────────────────────────────────────────────────
  # Frontend Dashboard
  # ────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    hostname: dashboard
    depends_on:
      - order-service
    networks: [exchange-net]
    ports:
      - "3000:80"
    environment:
      REACT_APP_WS_URL: ws://localhost:8001/ws
      REACT_APP_API_URL: http://localhost:8001
    restart: unless-stopped

  # ────────────────────────────────────────────────────────
  # Observability
  # ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.1
    hostname: prometheus
    networks: [exchange-net]
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.3
    hostname: grafana
    depends_on: [prometheus]
    networks: [exchange-net]
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/docker/grafana:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: exchange
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    hostname: kafka-ui
    depends_on: [kafka]
    networks: [exchange-net]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: exchange
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped
