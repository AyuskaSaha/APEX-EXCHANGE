name: Exchange CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/apex-exchange

jobs:

  # ─── Python Lint & Test ─────────────────────────────────────────────────────
  python-ci:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio pytest-cov

      - name: Ruff lint
        run: ruff check . --select E,W,F,I

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml \
            --ignore=tests/integration
        env:
          KAFKA_BOOTSTRAP: localhost:9092   # mocked in tests

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── C++ Build ───────────────────────────────────────────────────────────────
  cpp-ci:
    name: C++ Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            librdkafka-dev nlohmann-json3-dev

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend-ci:
    name: React Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

  # ─── Docker Build & Push ─────────────────────────────────────────────────────
  docker-publish:
    name: Build & Push Docker Images
    needs: [python-ci, cpp-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: order-service
            context: services/order_service
            dockerfile: deployment/docker/Dockerfile.python
          - name: risk-engine
            context: services/risk_service
            dockerfile: deployment/docker/Dockerfile.python
          - name: analytics-engine
            context: analytics
            dockerfile: deployment/docker/Dockerfile.python
          - name: market-simulator
            context: simulator
            dockerfile: deployment/docker/Dockerfile.python
          - name: ai-agents
            context: ai_agents
            dockerfile: deployment/docker/Dockerfile.python
          - name: matching-engine
            context: engine
            dockerfile: deployment/docker/Dockerfile.engine
          - name: dashboard
            context: frontend
            dockerfile: deployment/docker/Dockerfile.frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Kubernetes Smoke Test ───────────────────────────────────────────────────
  k8s-smoke:
    name: Kubernetes Smoke Test
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.9.0

      - name: Deploy to kind
        run: |
          kubectl apply -f deployment/kubernetes/namespace.yaml
          kubectl apply -f deployment/kubernetes/
          kubectl rollout status deployment/order-service -n exchange --timeout=120s
          kubectl rollout status deployment/matching-engine -n exchange --timeout=120s

      - name: Health checks
        run: |
          kubectl port-forward svc/order-service 8001:8001 -n exchange &
          sleep 5
          curl -f http://localhost:8001/health
